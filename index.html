<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0F0A0D;--bg2:#1A1018;--bg3:#221520;--bg4:#2C1A28;--text:#F5EEF2;--text2:#C9A8BC;--text3:#7A5A6E;--border:#3A1F32;--border2:#5A2E4A}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}

/* LOGIN SCREEN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;min-height:100vh;width:100%}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:48px 40px;display:flex;flex-direction:column;align-items:center;gap:20px;max-width:380px;width:100%}
.login-logo{font-family:'Playfair Display',serif;font-size:36px;font-weight:500;color:#F0A0C8;letter-spacing:-1px}
.login-sub{font-size:14px;color:var(--text3);text-align:center;line-height:1.6}
.btn-google{display:flex;align-items:center;gap:12px;padding:12px 24px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--text);transition:all 0.2s;width:100%;justify-content:center}
.btn-google:hover{background:var(--bg4);border-color:#8B2560}
.btn-google svg{width:18px;height:18px;flex-shrink:0}
.login-note{font-size:11.5px;color:var(--text3);text-align:center}

/* APP */
#app-screen{display:none;width:100%;align-items:flex-start;justify-content:center}
.app{width:100%;max-width:960px;background:var(--bg);border-radius:16px;overflow:hidden;border:1px solid var(--border2);display:flex;flex-direction:column;min-height:calc(100vh - 48px)}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:var(--bg2);border-bottom:1px solid var(--border)}
.top-left{display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#48C890;flex-shrink:0}
.sync-dot.off{background:#E05050}
.sync-dot.wait{background:#D09040}
.sync-label{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.user-area{display:flex;align-items:center;gap:8px}
.user-avatar{width:26px;height:26px;border-radius:50%;border:1px solid var(--border2)}
.user-name{font-size:12px;color:var(--text2)}
.btn-logout{font-size:11.5px;padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.btn-logout:hover{color:#E24B4A;border-color:#E24B4A}
.ws-bar{display:grid;grid-template-columns:1fr 1fr}
.ws-btn{padding:14px 10px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:var(--bg2);color:var(--text3);transition:all 0.2s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:9px;border-bottom:3px solid transparent}
.ws-btn .dot{width:11px;height:11px;border-radius:50%;background:var(--text3);transition:all 0.2s;flex-shrink:0}
#ws-vie-btn{border-right:1px solid var(--border)}
#ws-vie-btn.active{background:#3D1030;color:#F0A0C8;border-bottom:3px solid #C0508A;border-top:3px solid #C0508A}
#ws-vie-btn.active .dot{background:#E0609A;box-shadow:0 0 10px #E0609A}
#ws-work-btn.active{background:#0A1A35;color:#80B8F0;border-bottom:3px solid #3878C8;border-top:3px solid #3878C8}
#ws-work-btn.active .dot{background:#4898E8;box-shadow:0 0 10px #4898E8}
.ws-btn:hover:not(.active){color:var(--text2);background:var(--bg3)}
.ws-banner{padding:14px 20px 0;border-bottom:1px solid var(--border)}
.ws-banner.vie-banner{background:#3D1030}
.ws-banner.work-banner{background:#0A1A35}
.ws-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:500;margin-bottom:10px}
.vie-banner .ws-title{color:#F0A0C8}
.work-banner .ws-title{color:#80B8F0}
.tabs{display:flex}
.tab{padding:9px 16px;font-size:13px;cursor:pointer;border-bottom:2.5px solid transparent;color:var(--text3);transition:all 0.15s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.tab:hover:not(.active){color:var(--text2)}
.vie-banner .tab.active{color:#F0A0C8;border-bottom-color:#C0508A}
.work-banner .tab.active{color:#80B8F0;border-bottom-color:#3878C8}
.badge{display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;min-width:15px;height:15px;border-radius:8px;padding:0 4px;margin-left:4px}
.vie-banner .badge{background:#5A1840;color:#F0A0C8}
.work-banner .badge{background:#0F2550;color:#80B8F0}
.panels{flex:1;display:flex;flex-direction:column}
.panel{display:none;flex:1;overflow-y:auto;padding:18px 20px}
.panel.active{display:block}
.entry-box{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:16px}
.entry-title-row{margin-bottom:9px}
.entry-title-row input{width:100%;font-size:14px;padding:10px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg4);color:var(--text);font-family:'DM Sans',sans-serif}
.entry-title-row input:focus{outline:none;border-color:#8B2560}
.entry-title-row input::placeholder{color:var(--text3)}
.entry-bottom-row{display:flex;gap:8px;align-items:flex-start}
.entry-bottom-row textarea{flex:1;font-size:13px;padding:9px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg4);color:var(--text2);font-family:'DM Sans',sans-serif;resize:none;height:56px;line-height:1.5;min-width:0}
.entry-bottom-row textarea:focus{outline:none;border-color:#8B2560}
.entry-bottom-row textarea::placeholder{color:var(--text3)}
.entry-side{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.cat-sel{font-size:13px;padding:8px 11px;border-radius:8px;border:1px solid var(--border2);background:var(--bg4);color:var(--text2);font-family:'DM Sans',sans-serif;cursor:pointer;width:135px}
.btn-add{padding:8px 0;width:135px;color:white;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.vie .btn-add{background:#8B2560}.vie .btn-add:hover{background:#6A1848}
.work .btn-add{background:#1E4A8A}.work .btn-add:hover{background:#12306A}
.cat-cols{display:grid;gap:10px}
.cat-col{background:var(--bg3);border-radius:10px;border:1px solid var(--border);overflow:hidden;min-width:0}
.cat-col-head{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-col-name{font-size:12px;font-weight:500;color:var(--text2)}
.cat-col-count{font-size:11px;color:var(--text3);margin-left:auto}
.cat-col-body{padding:6px}
.task-mini{padding:8px 9px;border-radius:7px;background:var(--bg2);border:1px solid var(--border);margin-bottom:5px;transition:border-color 0.12s}
.task-mini:last-child{margin-bottom:0}
.task-mini:hover{border-color:var(--border2)}
.task-mini-top{display:flex;align-items:flex-start;gap:7px}
.mini-chk{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;cursor:pointer;transition:all 0.15s}
.task-mini-title{font-size:12.5px;color:var(--text);line-height:1.4;flex:1;word-break:break-word}
.task-mini-note{font-size:11px;color:var(--text3);margin-top:3px;margin-left:20px;line-height:1.4;font-style:italic}
.task-mini-ts{font-size:10px;color:var(--text3);margin-top:3px;margin-left:20px;font-family:'DM Mono',monospace}
.mini-del{font-size:11px;color:var(--text3);cursor:pointer;flex-shrink:0;opacity:0;padding:1px 3px;transition:opacity 0.12s}
.task-mini:hover .mini-del{opacity:1}
.mini-del:hover{color:#E24B4A}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:9px;border:1px solid transparent;transition:all 0.12s}
.task-item:hover{background:var(--bg3);border-color:var(--border)}
.chk{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:2px;cursor:pointer;transition:all 0.2s}
.task-body{flex:1;min-width:0}
.task-title-text{font-size:14px;color:var(--text);line-height:1.4}
.task-note-text{font-size:12.5px;color:var(--text3);margin-top:3px;font-style:italic;line-height:1.4}
.task-meta{display:flex;gap:7px;align-items:center;margin-top:5px;flex-wrap:wrap}
.task-ts{font-size:10.5px;color:var(--text3);font-family:'DM Mono',monospace}
.task-del{font-size:12px;color:var(--text3);cursor:pointer;padding:2px 5px;margin-left:auto;flex-shrink:0;opacity:0;transition:opacity 0.12s}
.task-item:hover .task-del{opacity:1}
.task-del:hover{color:#E24B4A}
.cat-pill{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.empty{text-align:center;padding:40px 0;color:var(--text3);font-size:14px}
.col-empty{padding:10px 8px;font-size:11.5px;color:var(--text3);text-align:center}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.stat-card{background:var(--bg3);border-radius:10px;padding:14px 16px;border:1px solid var(--border)}
.stat-val{font-size:26px;font-weight:500;font-family:'DM Mono',monospace}
.vie .stat-val{color:#E080B8}.work .stat-val{color:#60A8E8}
.stat-lbl{font-size:12px;color:var(--text3);margin-top:3px}
.hist-item{padding:11px 10px;border-bottom:1px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.hist-title{font-size:13.5px;color:var(--text3);text-decoration:line-through}
.hist-note{font-size:12px;color:var(--text3);font-style:italic;margin-top:2px}
.hist-meta{display:flex;gap:7px;margin-top:5px;flex-wrap:wrap;align-items:center}
.dur-pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.vie .dur-pill{color:#F0A0C8;background:#3D1030}.work .dur-pill{color:#80B8F0;background:#0A1A35}
.hist-ts{font-size:10.5px;color:var(--text3);font-family:'DM Mono',monospace}
.journal-entry-box{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:16px}
.journal-entry-box textarea{width:100%;font-size:14px;padding:11px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg4);color:var(--text);font-family:'DM Sans',sans-serif;resize:none;height:120px;line-height:1.7}
.journal-entry-box textarea:focus{outline:none;border-color:#8B2560}
.journal-entry-box textarea::placeholder{color:var(--text3)}
.journal-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.journal-date-lbl{font-size:11.5px;color:var(--text3);font-family:'DM Mono',monospace}
.btn-save{padding:8px 18px;color:white;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.vie .btn-save{background:#8B2560}.vie .btn-save:hover{background:#6A1848}
.work .btn-save{background:#1E4A8A}.work .btn-save:hover{background:#12306A}
.journal-list{margin-top:4px}
.journal-item{padding:15px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);margin-bottom:10px}
.journal-item-date{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:8px}
.journal-item-text{font-size:14px;color:var(--text2);line-height:1.7;white-space:pre-wrap}
.journal-item-actions{display:flex;justify-content:flex-end;margin-top:10px}
.btn-tiny{padding:4px 12px;font-size:12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-tiny:hover{color:#E24B4A;border-color:#E24B4A}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">MyTasks</div>
    <div class="login-sub">Ton espace personnel pour tâches,<br>habitudes et journal.</div>
    <button class="btn-google" onclick="APP.loginGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continuer avec Google
    </button>
    <div class="login-note">Tes données sont privées et liées à ton compte Google.</div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="app vie" id="app">
    <div class="top-bar">
      <div class="top-left">
        <span class="sync-dot wait" id="sync-dot"></span>
        <span class="sync-label" id="sync-label">Connexion...</span>
      </div>
      <div class="user-area">
        <img class="user-avatar" id="user-avatar" src="" alt="">
        <span class="user-name" id="user-name"></span>
        <button class="btn-logout" onclick="APP.logout()">Déconnexion</button>
      </div>
    </div>
    <div class="ws-bar">
      <button class="ws-btn active" id="ws-vie-btn" onclick="APP.switchWS('vie')">
        <span class="dot"></span>Vie personnelle
      </button>
      <button class="ws-btn" id="ws-work-btn" onclick="APP.switchWS('work')">
        <span class="dot"></span>Travail
      </button>
    </div>
    <div class="ws-banner vie-banner" id="ws-banner">
      <div class="ws-title" id="ws-title">Vie personnelle</div>
      <div class="tabs" id="tabs-row"></div>
    </div>
    <div class="panels">
      <div class="panel active" id="panel-tasks"></div>
      <div class="panel" id="panel-cats"></div>
      <div class="panel" id="panel-journal"></div>
      <div class="panel" id="panel-history"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5ESAf01jLZ_TJlhBN3F4yfdDGuDUeF9M",
  authDomain: "mytasks-8b975.firebaseapp.com",
  databaseURL: "https://mytasks-8b975-default-rtdb.firebaseio.com",
  projectId: "mytasks-8b975",
  storageBucket: "mytasks-8b975.firebasestorage.app",
  messagingSenderId: "23097912329",
  appId: "1:23097912329:web:f9ffb5b8bca5f6d427dcd8"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);
const auth = getAuth(firebaseApp);
const provider = new GoogleAuthProvider();

const WS = {
  vie: {
    name: 'Vie personnelle',
    cats: ['urgent','life','shopping','appointments','3d-print'],
    labels: {urgent:'Urgent',life:'Life',shopping:'Shopping',appointments:'Appointments','3d-print':'3D Print'},
    dots: {urgent:'#E05050',life:'#D070A0',shopping:'#A070C8',appointments:'#5090D0','3d-print':'#D09040'},
    pills: {urgent:{bg:'#3D1010',c:'#F09090'},life:{bg:'#3D1030',c:'#F0A0C8'},shopping:{bg:'#28103D',c:'#C0A0F0'},appointments:{bg:'#10203D',c:'#90C0F0'},'3d-print':{bg:'#3D2510',c:'#F0C090'}},
    journalLabel: 'Journal'
  },
  work: {
    name: 'Travail',
    cats: ['urgent','tasks','meetings'],
    labels: {urgent:'Urgent',tasks:'Tasks',meetings:'Meetings'},
    dots: {urgent:'#E05050',tasks:'#4898E8',meetings:'#48C890'},
    pills: {urgent:{bg:'#3D1010',c:'#F09090'},tasks:{bg:'#10203D',c:'#90C0F0'},meetings:{bg:'#103D25',c:'#90F0C0'}},
    journalLabel: 'Notes'
  }
};

let ws = 'vie', activeTab = 'tasks', currentUID = null, dbListener = null;
let data = {vie:{tasks:{},history:{},journal:{}},work:{tasks:{},history:{},journal:{}}};

function setSyncStatus(state) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if(state==='ok'){dot.className='sync-dot';lbl.textContent='Synchronisé'}
  else if(state==='off'){dot.className='sync-dot off';lbl.textContent='Hors ligne'}
  else{dot.className='sync-dot wait';lbl.textContent='Connexion...'}
}

function cfg() { return WS[ws]; }
function wsd() { return data[ws]; }
function objToArr(obj) {
  if(!obj) return [];
  return Object.entries(obj).map(([fbKey,v])=>({...v,fbKey})).sort((a,b)=>b.createdAt-a.createdAt);
}
function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('fr-CA',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'});
}
function fmtDur(ms) {
  const m = Math.round(ms/60000);
  if(m<1) return '<1min';
  if(m<60) return m+'min';
  const h=Math.floor(m/60),r=m%60;
  return h+'h'+(r?r+'m':'');
}
function pill(cat) {
  const p = cfg().pills[cat]||{bg:'#2A1A27',c:'#907080'};
  return `<span class="cat-pill" style="background:${p.bg};color:${p.c}">${cfg().labels[cat]||cat}</span>`;
}

function userDataPath(subpath) {
  return ref(db, `users/${currentUID}/${subpath}`);
}

function startListening() {
  if(dbListener) dbListener();
  dbListener = onValue(ref(db,`users/${currentUID}`), (snapshot) => {
    const val = snapshot.val();
    if(val) {
      data.vie = val.vie||{tasks:{},history:{},journal:{}};
      data.work = val.work||{tasks:{},history:{},journal:{}};
    } else {
      data = {vie:{tasks:{},history:{},journal:{}},work:{tasks:{},history:{},journal:{}}};
    }
    setSyncStatus('ok');
    renderTabs();
    renderAll();
  }, () => setSyncStatus('off'));
}

function switchWS(w) {
  ws = w; activeTab = 'tasks';
  document.getElementById('app').className = 'app '+w;
  document.getElementById('ws-banner').className = 'ws-banner '+(w==='vie'?'vie-banner':'work-banner');
  document.getElementById('ws-title').textContent = cfg().name;
  document.getElementById('ws-vie-btn').className = 'ws-btn'+(w==='vie'?' active':'');
  document.getElementById('ws-work-btn').className = 'ws-btn'+(w==='work'?' active':'');
  renderTabs(); renderAll();
}

function showTab(t) {
  activeTab = t;
  renderTabs();
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  renderAll();
}

function renderTabs() {
  const tasks = objToArr(wsd().tasks);
  const journal = objToArr(wsd().journal);
  const history = objToArr(wsd().history);
  const jLabel = cfg().journalLabel;
  const tabs = [
    {id:'tasks',label:'Tâches',badge:tasks.length},
    {id:'cats',label:'Par catégorie'},
    {id:'journal',label:jLabel,badge:journal.length},
    {id:'history',label:'Historique',badge:history.length}
  ];
  document.getElementById('tabs-row').innerHTML = tabs.map(t=>{
    const b = t.badge!=null?`<span class="badge">${t.badge}</span>`:'';
    return `<div class="tab${activeTab===t.id?' active':''}" onclick="APP.showTab('${t.id}')">${t.label}${b}</div>`;
  }).join('');
}

async function addTask() {
  const inp = document.getElementById('task-input');
  const noteEl = document.getElementById('task-note');
  const catEl = document.getElementById('cat-sel');
  const title = inp.value.trim();
  if(!title) return;
  setSyncStatus('wait');
  await push(userDataPath(`${ws}/tasks`),{title,note:noteEl.value.trim(),cat:catEl.value,createdAt:Date.now()});
  inp.value=''; noteEl.value='';
}

async function completeTask(fbKey, createdAt) {
  setSyncStatus('wait');
  const task = data[ws].tasks[fbKey];
  if(!task) return;
  await push(userDataPath(`${ws}/history`),{...task,completedAt:Date.now(),duration:Date.now()-createdAt});
  await remove(ref(db,`users/${currentUID}/${ws}/tasks/${fbKey}`));
}

async function deleteTask(fbKey) {
  setSyncStatus('wait');
  await remove(ref(db,`users/${currentUID}/${ws}/tasks/${fbKey}`));
}

async function saveJournal() {
  const ta = document.getElementById('journal-ta');
  const text = ta.value.trim();
  if(!text) return;
  setSyncStatus('wait');
  await push(userDataPath(`${ws}/journal`),{text,createdAt:Date.now()});
  ta.value='';
}

async function deleteJournal(fbKey) {
  setSyncStatus('wait');
  await remove(ref(db,`users/${currentUID}/${ws}/journal/${fbKey}`));
}

async function loginGoogle() {
  try { await signInWithPopup(auth, provider); }
  catch(e) { console.error(e); }
}

async function logout() {
  if(dbListener) dbListener();
  await signOut(auth);
}

function renderTasks() {
  const el = document.getElementById('panel-tasks');
  const tasks = objToArr(wsd().tasks);
  const cats = cfg().cats;
  const catOptions = cats.map(c=>`<option value="${c}">${cfg().labels[c]}</option>`).join('');
  let html = `<div class="entry-box">
    <div class="entry-title-row"><input type="text" id="task-input" placeholder="Nouvelle tâche..." onkeydown="if(event.key==='Enter')APP.addTask()"></div>
    <div class="entry-bottom-row">
      <textarea id="task-note" placeholder="Note ou description (optionnel)..."></textarea>
      <div class="entry-side">
        <select id="cat-sel" class="cat-sel">${catOptions}</select>
        <button class="btn-add" onclick="APP.addTask()">+ Ajouter</button>
      </div>
    </div>
  </div>`;
  if(!tasks.length){html+='<div class="empty">Aucune tâche active</div>';el.innerHTML=html;return;}
  html += tasks.map(t=>`
    <div class="task-item">
      <div class="chk" onclick="APP.completeTask('${t.fbKey}',${t.createdAt})"></div>
      <div class="task-body">
        <div class="task-title-text">${t.title}</div>
        ${t.note?`<div class="task-note-text">${t.note}</div>`:''}
        <div class="task-meta">${pill(t.cat)}<span class="task-ts">${fmtDate(t.createdAt)}</span></div>
      </div>
      <span class="task-del" onclick="APP.deleteTask('${t.fbKey}')">✕</span>
    </div>`).join('');
  el.innerHTML = html;
}

function renderCats() {
  const el = document.getElementById('panel-cats');
  const tasks = objToArr(wsd().tasks);
  const cats = cfg().cats;
  let html = `<div class="cat-cols" style="grid-template-columns:repeat(${cats.length},1fr)">`;
  for(const cat of cats) {
    const items = tasks.filter(t=>t.cat===cat);
    const dotColor = cfg().dots[cat]||'#907080';
    html += `<div class="cat-col">
      <div class="cat-col-head">
        <span class="cat-dot" style="background:${dotColor}"></span>
        <span class="cat-col-name">${cfg().labels[cat]}</span>
        <span class="cat-col-count">${items.length}</span>
      </div>
      <div class="cat-col-body">`;
    if(!items.length){html+='<div class="col-empty">Vide</div>';}
    else{html+=items.map(t=>`
      <div class="task-mini">
        <div class="task-mini-top">
          <div class="mini-chk" onclick="APP.completeTask('${t.fbKey}',${t.createdAt})"></div>
          <span class="task-mini-title">${t.title}</span>
          <span class="mini-del" onclick="APP.deleteTask('${t.fbKey}')">✕</span>
        </div>
        ${t.note?`<div class="task-mini-note">${t.note}</div>`:''}
        <div class="task-mini-ts">${fmtDate(t.createdAt)}</div>
      </div>`).join('');}
    html += '</div></div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

function renderJournal() {
  const el = document.getElementById('panel-journal');
  const entries = objToArr(wsd().journal);
  const label = cfg().journalLabel;
  const now = new Date();
  const dateStr = now.toLocaleDateString('fr-CA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  let html = `<div class="journal-entry-box">
    <textarea id="journal-ta" placeholder="${label==='Notes'?'Ajoute une note, idée ou référence...':'Écris ici... pensées, réflexions du jour.'}" onkeydown="if(event.ctrlKey&&event.key==='Enter')APP.saveJournal()"></textarea>
    <div class="journal-footer">
      <span class="journal-date-lbl">${dateStr} · Ctrl+Enter</span>
      <button class="btn-save" onclick="APP.saveJournal()">Sauvegarder</button>
    </div>
  </div>`;
  if(!entries.length){html+=`<div class="empty">Aucune entrée pour l'instant</div>`;el.innerHTML=html;return;}
  html += '<div class="journal-list">'+entries.map(j=>`
    <div class="journal-item">
      <div class="journal-item-date">${fmtDate(j.createdAt)}</div>
      <div class="journal-item-text">${j.text}</div>
      <div class="journal-item-actions"><button class="btn-tiny" onclick="APP.deleteJournal('${j.fbKey}')">Supprimer</button></div>
    </div>`).join('')+'</div>';
  el.innerHTML = html;
}

function renderHistory() {
  const el = document.getElementById('panel-history');
  const hist = objToArr(wsd().history);
  const today = new Date().toDateString();
  const todayN = hist.filter(h=>new Date(h.completedAt).toDateString()===today).length;
  const avg = hist.length ? hist.reduce((s,h)=>s+h.duration,0)/hist.length : null;
  let html = `<div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${hist.length}</div><div class="stat-lbl">Total complétées</div></div>
    <div class="stat-card"><div class="stat-val">${todayN}</div><div class="stat-lbl">Aujourd'hui</div></div>
    <div class="stat-card"><div class="stat-val">${avg!==null?fmtDur(avg):'—'}</div><div class="stat-lbl">Durée moyenne</div></div>
  </div>`;
  if(!hist.length){html+='<div class="empty">Aucune tâche complétée</div>';el.innerHTML=html;return;}
  html += hist.map(h=>`
    <div class="hist-item">
      <div class="hist-title">${h.title}</div>
      ${h.note?`<div class="hist-note">${h.note}</div>`:''}
      <div class="hist-meta">${pill(h.cat)}<span class="dur-pill">${fmtDur(h.duration)}</span><span class="hist-ts">${fmtDate(h.createdAt)} → ${fmtDate(h.completedAt)}</span></div>
    </div>`).join('');
  el.innerHTML = html;
}

function renderAll() {
  if(activeTab==='tasks') renderTasks();
  else if(activeTab==='cats') renderCats();
  else if(activeTab==='journal') renderJournal();
  else if(activeTab==='history') renderHistory();
}

onAuthStateChanged(auth, (user) => {
  if(user) {
    currentUID = user.uid;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    document.getElementById('user-name').textContent = user.displayName?.split(' ')[0] || '';
    document.getElementById('user-avatar').src = user.photoURL || '';
    startListening();
  } else {
    currentUID = null;
    data = {vie:{tasks:{},history:{},journal:{}},work:{tasks:{},history:{},journal:{}}};
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
});

window.APP = { switchWS, showTab, addTask, completeTask, deleteTask, saveJournal, deleteJournal, loginGoogle, logout };
</script>
</body>
