<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F7FA;
  --surface:#FFFFFF;
  --surface2:#F0F3F7;
  --border:#D8DEE9;
  --border2:#C0CAD8;
  --text:#1A2840;
  --text2:#4A5F78;
  --text3:#8A9BB0;
  --blue:#0070BA;
  --blue-dark:#003087;
  --blue-light:#E8F3FB;
  --blue-mid:#C5DFF5;
  --red:#E03030;
  --shadow:0 1px 4px rgba(0,48,135,0.08),0 4px 16px rgba(0,48,135,0.06);
  --shadow-sm:0 1px 3px rgba(0,48,135,0.10);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}

/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;min-height:100vh;width:100%}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;display:flex;flex-direction:column;align-items:center;gap:20px;max-width:380px;width:100%;box-shadow:var(--shadow)}
.login-logo{font-size:39.2px;font-weight:600;color:var(--blue-dark);letter-spacing:-0.5px}
.login-logo span{color:var(--blue)}
.login-sub{font-size:19.6px;color:var(--text2);text-align:center;line-height:1.6}
.btn-google{display:flex;align-items:center;gap:12px;padding:12px 24px;background:var(--surface);border:1.5px solid var(--border2);border-radius:10px;cursor:pointer;font-family:'Inter',sans-serif;font-size:19.6px;font-weight:500;color:var(--text);transition:all 0.2s;width:100%;justify-content:center}
.btn-google:hover{border-color:var(--blue);background:var(--blue-light);color:var(--blue-dark)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}
.login-note{font-size:16.1px;color:var(--text3);text-align:center}

/* APP SHELL */
#app-screen{display:none;width:100%;align-items:flex-start;justify-content:center}
.app{width:100%;max-width:1600px;background:var(--surface);border-radius:16px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow);display:flex;flex-direction:column;min-height:calc(100vh - 32px)}

/* TOP BAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:var(--blue-dark)}
.top-left{display:flex;align-items:center;gap:8px}
.app-logo{font-size:22.4px;font-weight:600;color:#fff;letter-spacing:-0.3px}
.app-logo span{color:#82C4F0}
.sync-sep{color:rgba(255,255,255,0.2);margin:0 6px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#48D48A;flex-shrink:0}
.sync-dot.off{background:#FF6B6B}
.sync-dot.wait{background:#FFB84D}
.sync-label{font-size:15.4px;color:rgba(255,255,255,0.55);font-family:'DM Mono',monospace}
.user-area{display:flex;align-items:center;gap:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.3)}
.user-name{font-size:18.2px;color:rgba(255,255,255,0.85);font-weight:500}
.btn-logout{font-size:16.8px;padding:5px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.25);background:transparent;color:rgba(255,255,255,0.7);cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s}
.btn-logout:hover{color:#fff;border-color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.1)}

/* SECTION HEADER */
.ws-banner{padding:18px 20px 0;background:var(--blue-light);border-bottom:1px solid var(--blue-mid)}
.ws-title{font-size:25.2px;font-weight:600;color:var(--blue-dark);margin-bottom:14px}

/* TABS */
.tabs{display:flex;gap:4px}
.tab{padding:9px 15px;font-size:18.2px;font-weight:500;cursor:pointer;border-radius:8px 8px 0 0;color:var(--text3);transition:all 0.15s;white-space:nowrap;font-family:'Inter',sans-serif;border:1px solid transparent;border-bottom:none;position:relative;bottom:-1px}
.tab:hover:not(.active){color:var(--blue);background:rgba(0,112,186,0.07)}
.tab.active{background:var(--surface);color:var(--blue-dark);font-weight:600;border-color:var(--blue-mid);border-bottom-color:var(--surface)}
.badge{display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;min-width:16px;height:16px;border-radius:8px;padding:0 4px;margin-left:5px;background:var(--blue);color:#fff}
.tab.active .badge{background:var(--blue-dark)}

/* PANELS */
.panels{flex:1;display:flex;flex-direction:column}
.panel{display:none;flex:1;overflow-y:auto;padding:20px}
.panel.active{display:block}

/* ENTRY BOX */
.entry-box{background:var(--surface);border:1.5px solid var(--blue-mid);border-radius:12px;padding:16px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.entry-title-row{margin-bottom:10px}
.entry-title-row input{width:100%;font-size:19.6px;padding:10px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;transition:border-color 0.15s}
.entry-title-row input:focus{outline:none;border-color:var(--blue);background:#fff}
.entry-title-row input::placeholder{color:var(--text3)}
.entry-bottom-row{display:flex;gap:10px;align-items:flex-start}
.entry-bottom-row textarea{flex:1;font-size:18.2px;padding:9px 13px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);font-family:'Inter',sans-serif;resize:none;height:60px;line-height:1.5;min-width:0;transition:border-color 0.15s}
.entry-bottom-row textarea:focus{outline:none;border-color:var(--blue);background:#fff}
.entry-bottom-row textarea::placeholder{color:var(--text3)}
.entry-side{display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.cat-sel{font-size:18.2px;padding:8px 11px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);font-family:'Inter',sans-serif;cursor:pointer;width:140px;transition:border-color 0.15s}
.cat-sel:focus{outline:none;border-color:var(--blue)}
.btn-add{padding:9px 0;width:140px;background:var(--blue);color:white;border:none;border-radius:8px;font-size:18.2px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background 0.15s}
.btn-add:hover{background:var(--blue-dark)}
.btn-add:active{transform:scale(0.98)}

/* TASK ITEMS */
.task-item{display:flex;align-items:flex-start;gap:10px;padding:12px;border-radius:10px;border:1px solid transparent;transition:all 0.12s}
.task-item:hover{background:var(--blue-light);border-color:var(--blue-mid)}
.chk{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:1px;cursor:pointer;transition:all 0.2s;background:#fff}
.chk:hover{border-color:var(--blue);background:var(--blue-light)}
.task-body{flex:1;min-width:0}
.task-title-text{font-size:19.6px;color:var(--text);line-height:1.4}
.task-note-text{font-size:17.5px;color:var(--text2);margin-top:3px;font-style:italic;line-height:1.4}
.task-meta{display:flex;gap:7px;align-items:center;margin-top:6px;flex-wrap:wrap}
.task-ts{font-size:14.7px;color:var(--text3);font-family:'DM Mono',monospace}
.task-del{font-size:16.8px;color:var(--text3);cursor:pointer;padding:3px 6px;margin-left:auto;flex-shrink:0;opacity:0;transition:opacity 0.12s;border-radius:4px}
.task-item:hover .task-del{opacity:1}
.task-del:hover{color:var(--red);background:rgba(224,48,48,0.08)}
.cat-pill{display:inline-block;font-size:15.4px;font-weight:500;padding:2px 8px;border-radius:20px}
.empty{text-align:center;padding:48px 0;color:var(--text3);font-size:19.6px}

/* CAT COLUMNS */
.cat-cols{display:grid;gap:10px}
.cat-col{background:var(--surface);border-radius:10px;border:1px solid var(--border);overflow:hidden;min-width:0;box-shadow:var(--shadow-sm)}
.cat-col-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;background:var(--surface2)}
.cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cat-col-name{font-size:16.8px;font-weight:600;color:var(--text2)}
.cat-col-count{font-size:15.4px;color:var(--text3);margin-left:auto;font-family:'DM Mono',monospace}
.cat-col-body{padding:8px}
.task-mini{padding:9px 10px;border-radius:8px;background:var(--surface);border:1px solid var(--border);margin-bottom:6px;transition:all 0.12s}
.task-mini:last-child{margin-bottom:0}
.task-mini:hover{border-color:var(--blue);background:var(--blue-light)}
.task-mini-top{display:flex;align-items:flex-start;gap:7px}
.mini-chk{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:2px;cursor:pointer;transition:all 0.15s;background:#fff}
.mini-chk:hover{border-color:var(--blue)}
.task-mini-title{font-size:17.5px;color:var(--text);line-height:1.4;flex:1;word-break:break-word}
.task-mini-note{font-size:15.4px;color:var(--text2);margin-top:3px;margin-left:20px;line-height:1.4;font-style:italic}
.task-mini-ts{font-size:14px;color:var(--text3);margin-top:4px;margin-left:20px;font-family:'DM Mono',monospace}
.mini-del{font-size:15.4px;color:var(--text3);cursor:pointer;flex-shrink:0;opacity:0;padding:1px 4px;transition:opacity 0.12s;border-radius:3px}
.task-mini:hover .mini-del{opacity:1}
.mini-del:hover{color:var(--red);background:rgba(224,48,48,0.08)}
.col-empty{padding:12px 8px;font-size:16.1px;color:var(--text3);text-align:center}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border-radius:10px;padding:16px;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.stat-val{font-size:39.2px;font-weight:600;color:var(--blue-dark);font-family:'DM Mono',monospace}
.stat-lbl{font-size:16.8px;color:var(--text3);margin-top:4px}

/* HISTORY */
.hist-title{font-size:18.9px;color:var(--text3);text-decoration:line-through}
.hist-note{font-size:16.8px;color:var(--text3);font-style:italic;margin-top:3px}
.hist-meta{display:flex;gap:7px;margin-top:6px;flex-wrap:wrap;align-items:center}
.dur-pill{font-size:15.4px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--blue-light);color:var(--blue-dark)}
.hist-ts{font-size:14.7px;color:var(--text3);font-family:'DM Mono',monospace}

/* JOURNAL */
.journal-entry-box{background:var(--surface);border:1.5px solid var(--blue-mid);border-radius:12px;padding:16px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.journal-entry-box textarea{width:100%;font-size:19.6px;padding:12px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;resize:none;height:120px;line-height:1.7;transition:border-color 0.15s}
.journal-entry-box textarea:focus{outline:none;border-color:var(--blue);background:#fff}
.journal-entry-box textarea::placeholder{color:var(--text3)}
.journal-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.journal-date-lbl{font-size:16.1px;color:var(--text3);font-family:'DM Mono',monospace}
.btn-save{padding:9px 20px;background:var(--blue);color:white;border:none;border-radius:8px;font-size:18.2px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background 0.15s}
.btn-save:hover{background:var(--blue-dark)}
.journal-list{margin-top:4px}
.journal-item{padding:16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);margin-bottom:10px;box-shadow:var(--shadow-sm)}
.journal-item-date{font-size:15.4px;color:var(--blue);font-family:'DM Mono',monospace;margin-bottom:8px;font-weight:500}
.journal-item-text{font-size:19.6px;color:var(--text);line-height:1.7;white-space:pre-wrap}
.journal-item-actions{display:flex;justify-content:flex-end;margin-top:10px}
.btn-tiny{padding:5px 12px;font-size:16.8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s}
.btn-tiny:hover{color:var(--red);border-color:var(--red);background:rgba(224,48,48,0.06)}

/* CHECKIN */
.ci-subtabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0}
.ci-subtab{padding:8px 14px;font-size:17.5px;font-weight:500;cursor:pointer;border-radius:7px 7px 0 0;color:var(--text3);transition:all 0.15s;font-family:'Inter',sans-serif;border:1px solid transparent;border-bottom:none;position:relative;bottom:-1px;background:transparent}
.ci-subtab:hover:not(.active){color:var(--blue);background:rgba(0,112,186,0.06)}
.ci-subtab.active{background:var(--surface);color:var(--blue-dark);font-weight:600;border-color:var(--blue-mid);border-bottom-color:var(--surface)}
.ci-subpanel{display:none}.ci-subpanel.active{display:block}
.checkin-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.checkin-card{background:var(--surface);border:1.5px solid var(--blue-mid);border-radius:12px;padding:18px;box-shadow:var(--shadow-sm)}
.checkin-card-title{font-size:18.2px;font-weight:600;color:var(--blue-dark);margin-bottom:14px}
.checkin-date-lbl{font-size:15.4px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:14px}
.ci-field{margin-bottom:12px}
.ci-field label{display:block;font-size:16.8px;color:var(--text2);margin-bottom:5px;font-weight:500}
.ci-field input{width:100%;padding:8px 11px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:19.6px;transition:border-color 0.15s}
.ci-field input:focus{outline:none;border-color:var(--blue);background:#fff}
.ci-field input::placeholder{color:var(--text3);font-family:'Inter',sans-serif;font-size:16.8px}
.ci-field .ci-hint{font-size:14.7px;color:var(--text3);margin-top:3px}
.btn-checkin-save{width:100%;padding:10px 0;background:var(--blue);color:white;border:none;border-radius:8px;font-size:18.2px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background 0.15s;margin-top:4px}
.btn-checkin-save:hover{background:var(--blue-dark)}
.btn-checkin-save.weekly{background:var(--blue-dark)}
.checkin-table-wrap{overflow-x:auto}
.checkin-table{width:100%;border-collapse:collapse;font-size:16.8px}
.checkin-table th{background:var(--surface2);color:var(--text3);font-size:14.7px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
.checkin-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);font-family:'DM Mono',monospace;font-size:16.8px}
.checkin-table tr:hover td{background:var(--blue-light)}
.checkin-table td.ci-num{font-weight:600;color:var(--text)}
.checkin-table td.ci-good{color:#1A8040;font-weight:700}
.checkin-table td.ci-ok{color:#806010;font-weight:600}
.checkin-table td.ci-low{color:#C02020;font-weight:700}
.weekly-tag{display:inline-block;font-size:12.6px;padding:1px 5px;border-radius:8px;background:var(--blue-light);color:var(--blue-dark);font-weight:600;margin-left:4px;vertical-align:middle}
.stat-section{margin-bottom:20px}
.stat-section-title{font-size:16.8px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px}
.stats-grid-2{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card-sm{background:var(--surface);border-radius:10px;padding:14px;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.stat-val-sm{font-size:30.8px;font-weight:700;color:var(--blue-dark);font-family:'DM Mono',monospace}
.stat-lbl-sm{font-size:15.4px;color:var(--text3);margin-top:3px}
.trend-bar-wrap{margin-top:6px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.trend-bar{height:100%;border-radius:2px;background:var(--blue);transition:width 0.4s}
.ci-export-row{display:flex;justify-content:flex-end;margin-bottom:10px}
.btn-export-sm{padding:6px 14px;font-size:16.8px;font-weight:600;border-radius:7px;border:1.5px solid var(--blue);background:transparent;color:var(--blue);cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s}
.btn-export-sm:hover{background:var(--blue);color:#fff}
.ci-del-btn{width:22px;height:22px;border-radius:5px;border:1px solid transparent;background:transparent;color:var(--text3);cursor:pointer;font-size:16.8px;line-height:1;transition:all 0.12s;padding:0}
.ci-del-btn:hover{color:var(--red);background:rgba(224,48,48,0.08);border-color:rgba(224,48,48,0.2)}

/* JOURNAL SIDEBAR */
.journal-layout{display:flex;gap:14px;height:100%}
.journal-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px}
.journal-sidebar{width:200px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.journal-sidebar-title{font-size:15.4px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;padding:0 4px;margin-bottom:4px}
.journal-sidebar-item{padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all 0.12s}
.journal-sidebar-item:hover{border-color:var(--blue);background:var(--blue-light)}
.journal-sidebar-item.selected{border-color:var(--blue-dark);background:var(--blue-light);font-weight:600}
.journal-sidebar-date{font-size:14px;color:var(--blue);font-family:'DM Mono',monospace;margin-bottom:3px}
.journal-sidebar-preview{font-size:16.1px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.journal-export-btn{padding:7px 0;width:100%;background:transparent;border:1.5px solid var(--blue);color:var(--blue);border-radius:8px;font-size:16.8px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;margin-top:auto}
.journal-export-btn:hover{background:var(--blue);color:#fff}
.journal-reader{background:var(--surface);border:1.5px solid var(--blue-mid);border-radius:12px;padding:20px;box-shadow:var(--shadow-sm);display:none}
.journal-reader.visible{display:block}
.journal-reader-date{font-size:15.4px;color:var(--blue);font-family:'DM Mono',monospace;margin-bottom:10px;font-weight:500}
.journal-reader-text{font-size:19.6px;color:var(--text);line-height:1.8;white-space:pre-wrap}

/* HIST DELETE */
.hist-item{padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);margin-bottom:8px;display:flex;align-items:flex-start;gap:8px;transition:all 0.12s}
.hist-item:hover{background:var(--blue-light);border-color:var(--blue-mid)}
.hist-body{flex:1;min-width:0}
.hist-del-btn{flex-shrink:0;width:24px;height:24px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--text3);cursor:pointer;font-size:18.2px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all 0.12s;margin-top:1px}
.hist-item:hover .hist-del-btn{opacity:1}
.hist-del-btn:hover{color:var(--red);background:rgba(224,48,48,0.08);border-color:rgba(224,48,48,0.2)}

/* MOBILE */
@media(max-width:600px){
  body{padding:0;align-items:flex-start}
  .app{border-radius:0;border:none;min-height:100vh;box-shadow:none}
  .top-bar{padding:10px 14px}
  .user-name{display:none}
  .ws-banner{padding:14px 14px 0}
  .ws-title{font-size:22.4px;margin-bottom:10px}
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:0}
  .tab{padding:8px 11px;font-size:16.8px}
  .panel{padding:14px}
  .entry-bottom-row{flex-direction:column}
  .entry-side{flex-direction:row;width:100%}
  .cat-sel{flex:1}
  .btn-add{flex:1;width:auto}
  .stats-grid{gap:8px}
  .stat-card{padding:12px}
  .stat-val{font-size:30.8px}
  .cat-cols{grid-template-columns:1fr!important}
  /* Journal mobile fix */
  .journal-layout{flex-direction:column}
  .journal-sidebar{width:100%;order:2;max-height:200px;overflow-y:auto;flex-direction:row;flex-wrap:wrap;gap:6px}
  .journal-sidebar-item{flex:1;min-width:140px}
  .journal-main{order:1}
  .journal-entry-box textarea{height:160px;font-size:16px;-webkit-text-size-adjust:100%}
  .journal-export-btn{width:100%;margin-top:8px}
}

/* CAT COLUMNS — polices réduites de 20% */
.cat-col-name{font-size:13.4px;font-weight:600;color:var(--text2)}
.cat-col-count{font-size:12.3px;color:var(--text3);margin-left:auto;font-family:'DM Mono',monospace}
.task-mini-title{font-size:14px;color:var(--text);line-height:1.4;flex:1;word-break:break-word}
.task-mini-note{font-size:12.3px;color:var(--text2);margin-top:3px;margin-left:20px;line-height:1.4;font-style:italic}
.task-mini-ts{font-size:11.2px;color:var(--text3);margin-top:4px;margin-left:20px;font-family:'DM Mono',monospace}
.col-empty{padding:12px 8px;font-size:12.9px;color:var(--text3);text-align:center}
.cat-pill{display:inline-block;font-size:12.3px;font-weight:500;padding:2px 8px;border-radius:20px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">My<span>Tasks</span></div>
    <div class="login-sub">Ton espace personnel pour tâches,<br>habitudes et journal.</div>
    <button class="btn-google" onclick="APP.loginGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continuer avec Google
    </button>
    <div class="login-note">Tes données sont privées et liées à ton compte Google.</div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="app" id="app">
    <div class="top-bar">
      <div class="top-left">
        <div class="app-logo">My<span>Tasks</span></div>
        <span class="sync-sep">·</span>
        <span class="sync-dot wait" id="sync-dot"></span>
        <span class="sync-label" id="sync-label">Connexion...</span>
      </div>
      <div class="user-area">
        <img class="user-avatar" id="user-avatar" src="" alt="">
        <span class="user-name" id="user-name"></span>
        <button class="btn-logout" onclick="APP.logout()">Déconnexion</button>
      </div>
    </div>
    <div class="ws-banner" id="ws-banner">
      <div class="ws-title">Vie personnelle</div>
      <div class="tabs" id="tabs-row"></div>
    </div>
    <div class="panels">
      <div class="panel active" id="panel-tasks"></div>
      <div class="panel" id="panel-cats"></div>
      <div class="panel" id="panel-journal"></div>
      <div class="panel" id="panel-history"></div>
      <div class="panel" id="panel-checkin"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, set as fbSet } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5ESAf01jLZ_TJlhBN3F4yfdDGuDUeF9M",
  authDomain: "mytasks-8b975.firebaseapp.com",
  databaseURL: "https://mytasks-8b975-default-rtdb.firebaseio.com",
  projectId: "mytasks-8b975",
  storageBucket: "mytasks-8b975.firebasestorage.app",
  messagingSenderId: "23097912329",
  appId: "1:23097912329:web:f9ffb5b8bca5f6d427dcd8"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);
const auth = getAuth(firebaseApp);
const provider = new GoogleAuthProvider();

const WS = {
  vie: {
    name: 'Vie personnelle',
    cats: ['urgent','life','shopping','appointments','3d-print','reminders'],
    labels: {urgent:'Urgent',life:'Life',shopping:'Shopping',appointments:'Rendez-vous','3d-print':'3D Print',reminders:'Reminders'},
    dots: {urgent:'#E03030',life:'#D070A0',shopping:'#7050C8',appointments:'#2080D0','3d-print':'#D09040',reminders:'#20A880'},
    pills: {
      urgent:{bg:'#FDEAEA',c:'#C02020'},
      life:{bg:'#FDE8F3',c:'#A03070'},
      shopping:{bg:'#EDE8FD',c:'#5030A0'},
      appointments:{bg:'#E3F0FD',c:'#1060A8'},
      '3d-print':{bg:'#FDF4E3',c:'#9A6010'},
      reminders:{bg:'#E3FDF5',c:'#0A7A58'}
    },
    journalLabel: 'Journal'
  }
};

let ws = 'vie', activeTab = 'tasks', currentUID = null, dbListener = null;
let data = {vie:{tasks:{},history:{},journal:{},checkin:{}}, _flags:{}};
let selectedJournalKey = null;

function setSyncStatus(state) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if(state==='ok'){dot.className='sync-dot';lbl.textContent='Synchronisé'}
  else if(state==='off'){dot.className='sync-dot off';lbl.textContent='Hors ligne'}
  else{dot.className='sync-dot wait';lbl.textContent='Connexion...'}
}

function cfg() { return WS[ws]; }
function wsd() { return data[ws]; }
function objToArr(obj) {
  if(!obj) return [];
  return Object.entries(obj).map(([fbKey,v])=>({...v,fbKey})).sort((a,b)=>b.createdAt-a.createdAt);
}
function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('fr-CA',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'});
}
function fmtDur(ms) {
  const m = Math.round(ms/60000);
  if(m<1) return '<1min';
  if(m<60) return m+'min';
  const h=Math.floor(m/60),r=m%60;
  return h+'h'+(r?r+'m':'');
}
function pill(cat) {
  const p = cfg().pills[cat]||{bg:'#EEF0F3',c:'#607080'};
  return `<span class="cat-pill" style="background:${p.bg};color:${p.c}">${cfg().labels[cat]||cat}</span>`;
}
function userDataPath(subpath) {
  return ref(db, `users/${currentUID}/${subpath}`);
}

function startListening() {
  if(dbListener) dbListener();
  dbListener = onValue(ref(db,`users/${currentUID}`), (snapshot) => {
    const val = snapshot.val();
    if(val) {
      data.vie = val.vie||{tasks:{},history:{},journal:{},checkin:{}};
      if(!data.vie.checkin) data.vie.checkin = {};
      data._flags = val._flags||{};
    } else {
      data = {vie:{tasks:{},history:{},journal:{},checkin:{}}};
      data._flags = {};
    }
    setSyncStatus('ok');
    renderTabs();
    renderAll();
  }, () => setSyncStatus('off'));
}

async function seedCheckinData() {
  // Write flag first to prevent double-import
  await fbSet(ref(db,`users/${currentUID}/_flags/checkinSeeded`), true);
  const daily = [
    {d:'2026-03-30',e:5,p:6,c:8},{d:'2026-03-31',e:6,p:4,c:4},{d:'2026-04-01',e:6,p:4,c:5},
    {d:'2026-04-02',e:5,p:5,c:4},{d:'2026-04-03',e:5,p:6,c:4},{d:'2026-04-04',e:6,p:7,c:5},
    {d:'2026-04-05',e:6,p:7,c:6},{d:'2026-04-06',e:4,p:8,c:8},{d:'2026-04-07',e:7,p:9,c:6},
    {d:'2026-04-08',e:6,p:6,c:5},{d:'2026-04-09',e:6,p:6,c:3},{d:'2026-04-10',e:6,p:6,c:3},
    {d:'2026-04-11',e:7,p:7,c:5},{d:'2026-04-12',e:4,p:8,c:3},{d:'2026-04-13',e:7,p:8,c:5},
    {d:'2026-04-14',e:6,p:6,c:7},{d:'2026-04-15',e:5.5,p:6,c:8},{d:'2026-04-16',e:6,p:9,c:8},
    {d:'2026-04-17',e:5.5,p:9,c:4.5},{d:'2026-04-18',e:3,p:9,c:3.5},{d:'2026-04-19',e:5,p:9,c:4.5},
    {d:'2026-04-20',e:4,p:8,c:5},{d:'2026-04-21',e:5,p:5,c:6},{d:'2026-04-22',e:5,p:6,c:7},
    {d:'2026-04-23',e:3,p:6,c:3}
  ];
  const weeklyData = [
    {d:'2026-03-30',r:8,couple:6,poids:263.6},
    {d:'2026-04-06',r:7,couple:6,poids:259.6},
    {d:'2026-04-13',r:5,couple:6,poids:258.8},
    {d:'2026-04-20',r:null,couple:null,poids:257}
  ];
  const promises = [];
  for(const row of daily) {
    const ts = new Date(row.d+'T12:00:00').getTime();
    promises.push(push(userDataPath(`${ws}/checkin`),{createdAt:ts,weekly:false,energie:row.e,pensees:row.p,corps:row.c}));
  }
  for(const row of weeklyData) {
    const ts = new Date(row.d+'T08:00:00').getTime();
    const entry = {createdAt:ts,weekly:true};
    if(row.r!=null) entry.repos=row.r;
    if(row.couple!=null) entry.couple=row.couple;
    if(row.poids!=null) entry.poids=row.poids;
    promises.push(push(userDataPath(`${ws}/checkin`),entry));
  }
  await Promise.all(promises);
}

function showTab(t) {
  activeTab = t;
  renderTabs();
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  renderAll();
}

function renderTabs() {
  const tasks = objToArr(wsd().tasks);
  const journal = objToArr(wsd().journal);
  const history = objToArr(wsd().history);
  const checkin = objToArr(wsd().checkin||{});
  const jLabel = cfg().journalLabel;
  const tabs = [
    {id:'tasks',label:'Tâches',badge:tasks.length},
    {id:'cats',label:'Par catégorie',badge:tasks.length||null},
    {id:'checkin',label:'Check-in',badge:checkin.length||null},
    {id:'journal',label:jLabel,badge:journal.length},
    {id:'history',label:'Historique',badge:history.length}
  ];
  document.getElementById('tabs-row').innerHTML = tabs.map(t=>{
    const b = t.badge!=null?`<span class="badge">${t.badge}</span>`:'';
    return `<div class="tab${activeTab===t.id?' active':''}" onclick="APP.showTab('${t.id}')">${t.label}${b}</div>`;
  }).join('');
}

async function addTask() {
  const inp = document.getElementById('task-input');
  const noteEl = document.getElementById('task-note');
  const catEl = document.getElementById('cat-sel');
  const title = inp.value.trim();
  if(!title) return;
  setSyncStatus('wait');
  await push(userDataPath(`${ws}/tasks`),{title,note:noteEl.value.trim(),cat:catEl.value,createdAt:Date.now()});
  inp.value=''; noteEl.value='';
}

async function completeTask(fbKey, createdAt) {
  setSyncStatus('wait');
  const task = data[ws].tasks[fbKey];
  if(!task) return;
  await push(userDataPath(`${ws}/history`),{...task,completedAt:Date.now(),duration:Date.now()-createdAt});
  await remove(ref(db,`users/${currentUID}/${ws}/tasks/${fbKey}`));
}

async function deleteTask(fbKey) {
  setSyncStatus('wait');
  await remove(ref(db,`users/${currentUID}/${ws}/tasks/${fbKey}`));
}

async function saveJournal() {
  const ta = document.getElementById('journal-ta');
  const text = ta.value.trim();
  if(!text) return;
  setSyncStatus('wait');
  await push(userDataPath(`${ws}/journal`),{text,createdAt:Date.now()});
  ta.value='';
}

async function deleteJournal(fbKey) {
  setSyncStatus('wait');
  await remove(ref(db,`users/${currentUID}/${ws}/journal/${fbKey}`));
}

async function loginGoogle() {
  try { await signInWithPopup(auth, provider); }
  catch(e) { console.error(e); }
}

async function logout() {
  if(dbListener) dbListener();
  await signOut(auth);
}

function renderTasks() {
  const el = document.getElementById('panel-tasks');
  const tasks = objToArr(wsd().tasks);
  const cats = cfg().cats;
  const catOptions = cats.map(c=>`<option value="${c}">${cfg().labels[c]}</option>`).join('');
  let html = `<div class="entry-box">
    <div class="entry-title-row"><input type="text" id="task-input" placeholder="Nouvelle tâche..." onkeydown="if(event.key==='Enter')APP.addTask()"></div>
    <div class="entry-bottom-row">
      <textarea id="task-note" placeholder="Note ou description (optionnel)..."></textarea>
      <div class="entry-side">
        <select id="cat-sel" class="cat-sel">${catOptions}</select>
        <button class="btn-add" onclick="APP.addTask()">+ Ajouter</button>
      </div>
    </div>
  </div>`;
  if(!tasks.length){html+='<div class="empty">Aucune tâche active</div>';el.innerHTML=html;return;}
  html += tasks.map(t=>`
    <div class="task-item">
      <div class="chk" onclick="APP.completeTask('${t.fbKey}',${t.createdAt})"></div>
      <div class="task-body">
        <div class="task-title-text">${t.title}</div>
        ${t.note?`<div class="task-note-text">${t.note}</div>`:''}
        <div class="task-meta">${pill(t.cat)}<span class="task-ts">${fmtDate(t.createdAt)}</span></div>
      </div>
      <span class="task-del" onclick="APP.deleteTask('${t.fbKey}')">✕</span>
    </div>`).join('');
  el.innerHTML = html;
}

function renderCats() {
  const el = document.getElementById('panel-cats');
  const tasks = objToArr(wsd().tasks);
  const cats = cfg().cats;
  let html = `<div class="cat-cols" style="grid-template-columns:repeat(${cats.length},1fr)">`;
  for(const cat of cats) {
    const items = tasks.filter(t=>t.cat===cat);
    const dotColor = cfg().dots[cat]||'#8090A0';
    html += `<div class="cat-col">
      <div class="cat-col-head">
        <span class="cat-dot" style="background:${dotColor}"></span>
        <span class="cat-col-name">${cfg().labels[cat]}</span>
        <span class="cat-col-count">${items.length}</span>
      </div>
      <div class="cat-col-body">`;
    if(!items.length){html+='<div class="col-empty">Vide</div>';}
    else{html+=items.map(t=>`
      <div class="task-mini">
        <div class="task-mini-top">
          <div class="mini-chk" onclick="APP.completeTask('${t.fbKey}',${t.createdAt})"></div>
          <span class="task-mini-title">${t.title}</span>
          <span class="mini-del" onclick="APP.deleteTask('${t.fbKey}')">✕</span>
        </div>
        ${t.note?`<div class="task-mini-note">${t.note}</div>`:''}
        <div class="task-mini-ts">${fmtDate(t.createdAt)}</div>
      </div>`).join('');}
    html += '</div></div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

function renderJournal() {
  const el = document.getElementById('panel-journal');
  const entries = objToArr(wsd().journal);
  const now = new Date();
  const dateStr = now.toLocaleDateString('fr-CA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  // sidebar entries
  let sidebarHtml = '';
  if(entries.length) {
    sidebarHtml = entries.map(j=>`
      <div class="journal-sidebar-item${selectedJournalKey===j.fbKey?' selected':''}" onclick="APP.selectJournal('${j.fbKey}')">
        <div class="journal-sidebar-date">${fmtDate(j.createdAt)}</div>
        <div class="journal-sidebar-preview">${j.text.replace(/</g,'&lt;').substring(0,60)}</div>
      </div>`).join('');
  }

  // reader panel
  const selected = entries.find(j=>j.fbKey===selectedJournalKey);
  const readerHtml = selected ? `
    <div class="journal-reader visible">
      <div class="journal-reader-date">${fmtDate(selected.createdAt)}</div>
      <div class="journal-reader-text">${selected.text.replace(/</g,'&lt;')}</div>
    </div>` : '';

  const html = `<div class="journal-layout">
    <div class="journal-main">
      <div class="journal-entry-box">
        <textarea id="journal-ta" placeholder="Écris ici... pensées, réflexions du jour." onkeydown="if(event.ctrlKey&&event.key==='Enter')APP.saveJournal()"></textarea>
        <div class="journal-footer">
          <span class="journal-date-lbl">${dateStr} · Ctrl+Enter</span>
          <button class="btn-save" onclick="APP.saveJournal()">Sauvegarder</button>
        </div>
      </div>
      ${readerHtml}
      ${!entries.length?'<div class="empty">Aucune entrée pour l\'instant</div>':''}
    </div>
    <div class="journal-sidebar">
      <div class="journal-sidebar-title">Mes entrées</div>
      ${sidebarHtml}
      ${entries.length?`<button class="journal-export-btn" onclick="APP.exportJournalCSV()">⬇ Export CSV</button>`:''}
    </div>
  </div>`;
  el.innerHTML = html;
}

function renderHistory() {
  const el = document.getElementById('panel-history');
  const hist = objToArr(wsd().history);
  const today = new Date().toDateString();
  const todayN = hist.filter(h=>new Date(h.completedAt).toDateString()===today).length;
  const avg = hist.length ? hist.reduce((s,h)=>s+h.duration,0)/hist.length : null;
  let html = `<div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${hist.length}</div><div class="stat-lbl">Total complétées</div></div>
    <div class="stat-card"><div class="stat-val">${todayN}</div><div class="stat-lbl">Aujourd'hui</div></div>
    <div class="stat-card"><div class="stat-val">${avg!==null?fmtDur(avg):'—'}</div><div class="stat-lbl">Durée moyenne</div></div>
  </div>`;
  if(!hist.length){html+='<div class="empty">Aucune tâche complétée</div>';el.innerHTML=html;return;}
  html += `<div class="ci-export-row"><button class="btn-export-sm" onclick="APP.exportHistoryCSV()">⬇ Export CSV</button></div>`;
  html += hist.map(h=>`
    <div class="hist-item">
      <div class="hist-body">
        <div class="hist-title">${h.title}</div>
        ${h.note?`<div class="hist-note">${h.note}</div>`:''}
        <div class="hist-meta">${pill(h.cat)}<span class="dur-pill">${fmtDur(h.duration)}</span><span class="hist-ts">${fmtDate(h.createdAt)} → ${fmtDate(h.completedAt)}</span></div>
      </div>
      <button class="hist-del-btn" onclick="APP.deleteHistory('${h.fbKey}')" title="Supprimer">✕</button>
    </div>`).join('');
  el.innerHTML = html;
}

let ciSubTab = 'saisie';

function ciColor(val) {
  if(val==null) return '';
  if(val>=7) return 'ci-good';
  if(val>=5) return 'ci-ok';
  return 'ci-low';
}

function renderCheckin() {
  const el = document.getElementById('panel-checkin');
  const allEntries = objToArr(wsd().checkin||{}).sort((a,b)=>b.createdAt-a.createdAt);
  const daily = allEntries.filter(e=>!e.weekly);
  const weekly = allEntries.filter(e=>e.weekly);
  const hasData = allEntries.length > 0;

  const subtabs = [
    {id:'saisie',label:'📝 Saisie'},
    {id:'journal',label:'📅 Journal quotidien'},
    {id:'hebdo',label:'📋 Hebdomadaire'},
    {id:'stats',label:'📊 Statistiques'},
  ];

  let html = `<div class="ci-subtabs">${subtabs.map(t=>`
    <div class="ci-subtab${ciSubTab===t.id?' active':''}" onclick="APP.setCiTab('${t.id}')">${t.label}</div>`).join('')}</div>`;

  const seeded = data._flags && data._flags.checkinSeeded;
  const checkinEmpty = Object.keys(data.vie.checkin||{}).length === 0;
  const showImport = !seeded || checkinEmpty;
  // ---- SAISIE ----
  const todayISO = new Date().toISOString().split('T')[0];
  html += `<div class="ci-subpanel${ciSubTab==='saisie'?' active':''}">
    ${showImport ? `<div style="background:#FFF8E8;border:1.5px solid #F0C040;border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px">
      <div style="font-size:13px;color:#6A4A00;">📥 <strong>Import données Excel</strong> — 25 entrées quotidiennes + 4 hebdomadaires du fichier Checkin_1.xlsx</div>
      <button onclick="APP.seedCheckinData()" style="flex-shrink:0;padding:8px 16px;background:#0070BA;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif">Importer</button>
    </div>` : ''}
    <div class="checkin-form-grid">
      <div class="checkin-card">
        <div class="checkin-card-title">📅 Check-in quotidien</div>
        <div class="ci-field"><label>📆 Date</label><input type="date" id="ci-date-daily" value="${todayISO}"></div>
        <div class="ci-field"><label>⚡ Énergie /10</label><input type="number" id="ci-energie" min="0" max="10" step="0.5" placeholder="ex: 6.5"><div class="ci-hint">Ton niveau d'énergie général</div></div>
        <div class="ci-field"><label>🧠 Pensées intenses /10</label><input type="number" id="ci-pensees" min="0" max="10" step="0.5" placeholder="ex: 7"><div class="ci-hint">Intensité des pensées / rumination</div></div>
        <div class="ci-field"><label>💪 Corps / Bouffe /10</label><input type="number" id="ci-corps" min="0" max="10" step="0.5" placeholder="ex: 5"><div class="ci-hint">Comment tu te sens physiquement + alimentation</div></div>
        <button class="btn-checkin-save" onclick="APP.saveCheckin(false)">💾 Sauvegarder le jour</button>
      </div>
      <div class="checkin-card">
        <div class="checkin-card-title">📋 Check-in hebdomadaire</div>
        <div class="ci-field"><label>📆 Date (début de semaine)</label><input type="date" id="ci-date-weekly" value="${todayISO}"></div>
        <div class="ci-field"><label>😴 Repos / Sommeil /10</label><input type="number" id="ci-repos" min="0" max="10" step="0.5" placeholder="ex: 7"></div>
        <div class="ci-field"><label>❤️ Couple /10</label><input type="number" id="ci-couple" min="0" max="10" step="0.5" placeholder="ex: 8"></div>
        <div class="ci-field"><label>⚖️ Poids (lbs)</label><input type="number" id="ci-poids" min="100" max="400" step="0.1" placeholder="ex: 258.5"></div>
        <button class="btn-checkin-save weekly" onclick="APP.saveCheckin(true)">💾 Sauvegarder la semaine</button>
      </div>
    </div>
  </div>`;

  // ---- JOURNAL QUOTIDIEN ----
  function scoreColor(v){ return v==null?'—':`<span class="${ciColor(v)}">${v}</span>`; }
  const dailyRows = daily.map(e=>{
    const d = new Date(e.createdAt);
    const dStr = d.toLocaleDateString('fr-CA',{weekday:'short',month:'short',day:'numeric'});
    const note = e.energie!=null&&e.pensees!=null&&e.corps!=null ? Math.round(((+e.energie + +e.pensees + +e.corps)/3)*100)/100 : null;
    return `<tr>
      <td>${dStr}</td>
      <td class="ci-num ${ciColor(e.energie)}">${e.energie??'—'}</td>
      <td class="ci-num ${ciColor(e.pensees)}">${e.pensees??'—'}</td>
      <td class="ci-num ${ciColor(e.corps)}">${e.corps??'—'}</td>
      <td class="ci-num ${ciColor(note)}">${note??'—'}</td>
      <td><button class="ci-del-btn" onclick="APP.deleteCheckin('${e.fbKey}')" title="Supprimer">✕</button></td>
    </tr>`;
  }).join('');

  html += `<div class="ci-subpanel${ciSubTab==='journal'?' active':''}">
    <div class="ci-export-row"><button class="btn-export-sm" onclick="APP.exportCheckinCSV('daily')">⬇ Export CSV</button></div>
    <div class="checkin-table-wrap"><table class="checkin-table">
      <thead><tr><th>Date</th><th>⚡ Énergie</th><th>🧠 Pensées</th><th>💪 Corps</th><th>📝 Note moy.</th><th></th></tr></thead>
      <tbody>${daily.length?dailyRows:'<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:24px">Aucune entrée</td></tr>'}</tbody>
    </table></div>
  </div>`;

  // ---- HEBDOMADAIRE ----
  const weeklyRows = weekly.map(e=>{
    const d = new Date(e.createdAt);
    const dStr = d.toLocaleDateString('fr-CA',{month:'short',day:'numeric'});
    const wStart = new Date(e.createdAt); wStart.setHours(0,0,0,0);
    const wEnd = new Date(wStart); wEnd.setDate(wStart.getDate()+7);
    const weekDailies = daily.filter(de=>{const t=de.createdAt;return t>=wStart.getTime()&&t<wEnd.getTime();});
    const avgE = weekDailies.length ? Math.round(weekDailies.reduce((s,d)=>s+(+d.energie||0),0)/weekDailies.length*100)/100 : null;
    const avgP = weekDailies.length ? Math.round(weekDailies.reduce((s,d)=>s+(+d.pensees||0),0)/weekDailies.length*100)/100 : null;
    const avgC = weekDailies.length ? Math.round(weekDailies.reduce((s,d)=>s+(+d.corps||0),0)/weekDailies.length*100)/100 : null;
    return `<tr>
      <td>${dStr}</td>
      <td class="ci-num ${ciColor(avgE)}">${avgE??'—'}</td>
      <td class="ci-num ${ciColor(avgP)}">${avgP??'—'}</td>
      <td class="ci-num ${ciColor(e.repos)}">${e.repos??'—'}</td>
      <td class="ci-num ${ciColor(avgC)}">${avgC??'—'}</td>
      <td class="ci-num ${ciColor(e.couple)}">${e.couple??'—'}</td>
      <td class="ci-num">${e.poids!=null?e.poids+' lbs':'—'}</td>
      <td><button class="ci-del-btn" onclick="APP.deleteCheckin('${e.fbKey}')" title="Supprimer">✕</button></td>
    </tr>`;
  }).join('');

  html += `<div class="ci-subpanel${ciSubTab==='hebdo'?' active':''}">
    <div class="ci-export-row"><button class="btn-export-sm" onclick="APP.exportCheckinCSV('weekly')">⬇ Export CSV</button></div>
    <div class="checkin-table-wrap"><table class="checkin-table">
      <thead><tr><th>Semaine</th><th>⚡ Énergie moy.</th><th>🧠 Pensées moy.</th><th>😴 Repos</th><th>💪 Corps moy.</th><th>❤️ Couple</th><th>⚖️ Poids</th><th></th></tr></thead>
      <tbody>${weekly.length?weeklyRows:'<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:24px">Aucune entrée hebdo</td></tr>'}</tbody>
    </table></div>
  </div>`;

  // ---- STATS ----
  const avgOf = (arr,key) => { const v=arr.filter(e=>e[key]!=null); return v.length?Math.round(v.reduce((s,e)=>s+(+e[key]),0)/v.length*100)/100:null; };
  const avgEnergie = avgOf(daily,'energie');
  const avgPensees = avgOf(daily,'pensees');
  const avgCorps   = avgOf(daily,'corps');
  const avgRepos   = avgOf(weekly,'repos');
  const avgCouple  = avgOf(weekly,'couple');
  const poidsStart = weekly.length ? weekly[weekly.length-1].poids : null;
  const poidsCur   = weekly.length ? weekly[0].poids : null;
  const poidsDelta = poidsStart&&poidsCur ? Math.round((poidsCur-poidsStart)*10)/10 : null;
  const globalAvg  = [avgEnergie,avgPensees,avgCorps,avgRepos,avgCouple].filter(v=>v!=null);
  const globalScore= globalAvg.length ? Math.round(globalAvg.reduce((s,v)=>s+v,0)/globalAvg.length*100)/100 : null;

  function statCard(val,lbl,suffix=''){
    const pct = suffix===''&&val!=null ? (val/10)*100 : 50;
    return `<div class="stat-card-sm">
      <div class="stat-val-sm ${val!=null?ciColor(val):''}">${val!=null?val+(suffix):'—'}</div>
      <div class="stat-lbl-sm">${lbl}</div>
      ${suffix===''&&val!=null?`<div class="trend-bar-wrap"><div class="trend-bar" style="width:${pct}%"></div></div>`:''}
    </div>`;
  }

  // Last 7 daily entries trend
  const last7 = daily.slice(0,7).reverse();
  const trendRows = last7.map(e=>{
    const note = e.energie!=null&&e.pensees!=null&&e.corps!=null ? Math.round(((+e.energie + +e.pensees + +e.corps)/3)*100)/100 : null;
    const d = new Date(e.createdAt).toLocaleDateString('fr-CA',{weekday:'short',day:'numeric'});
    return `<tr><td>${d}</td><td class="ci-num ${ciColor(e.energie)}">${e.energie??'—'}</td><td class="ci-num ${ciColor(e.pensees)}">${e.pensees??'—'}</td><td class="ci-num ${ciColor(e.corps)}">${e.corps??'—'}</td><td class="ci-num ${ciColor(note)}">${note??'—'}</td></tr>`;
  }).join('');

  html += `<div class="ci-subpanel${ciSubTab==='stats'?' active':''}">
    <div class="stat-section">
      <div class="stat-section-title">Moyennes globales (toutes entrées)</div>
      <div class="stats-grid-2">
        ${statCard(globalScore,'🏆 Score global')}
        ${statCard(avgEnergie,'⚡ Énergie moy.')}
        ${statCard(avgPensees,'🧠 Pensées moy.')}
        ${statCard(avgCorps,'💪 Corps moy.')}
        ${statCard(avgRepos,'😴 Repos moy.')}
        ${statCard(avgCouple,'❤️ Couple moy.')}
        ${statCard(poidsStart!=null&&poidsCur!=null?poidsCur:null,'⚖️ Poids actuel',' lbs')}
        ${statCard(poidsDelta!=null?(poidsDelta>0?'+'+poidsDelta:poidsDelta):null,'📉 Variation poids',' lbs')}
      </div>
    </div>
    <div class="stat-section">
      <div class="stat-section-title">7 derniers jours</div>
      <div class="checkin-table-wrap"><table class="checkin-table">
        <thead><tr><th>Date</th><th>⚡ Énergie</th><th>🧠 Pensées</th><th>💪 Corps</th><th>📝 Note</th></tr></thead>
        <tbody>${last7.length?trendRows:'<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:24px">Pas encore de données</td></tr>'}</tbody>
      </table></div>
    </div>
  </div>`;

  el.innerHTML = html;
}

function setCiTab(t) { ciSubTab = t; renderCheckin(); }

async function saveCheckin(isWeekly) {
  const getVal = id => { const el=document.getElementById(id); if(!el||el.value==='') return null; return parseFloat(el.value); };
  const dateEl = document.getElementById(isWeekly ? 'ci-date-weekly' : 'ci-date-daily');
  const dateVal = dateEl ? dateEl.value : null;
  const ts = dateVal ? new Date(dateVal+'T12:00:00').getTime() : Date.now();
  const entry = { createdAt: ts, weekly: isWeekly };

  if(!isWeekly) {
    entry.energie = getVal('ci-energie');
    entry.pensees  = getVal('ci-pensees');
    entry.corps    = getVal('ci-corps');
    if(entry.energie==null&&entry.pensees==null&&entry.corps==null){ alert('Entre au moins une valeur.'); return; }
  } else {
    entry.repos  = getVal('ci-repos');
    entry.couple = getVal('ci-couple');
    entry.poids  = getVal('ci-poids');
    if(entry.repos==null&&entry.couple==null&&entry.poids==null){ alert('Entre au moins une valeur.'); return; }

    // Auto-compute averages from the 7 daily entries closest before the selected date
    const allDaily = objToArr(wsd().checkin||{})
      .filter(e=>!e.weekly && e.createdAt <= ts)
      .sort((a,b)=>b.createdAt-a.createdAt)
      .slice(0,7);

    const avg = key => {
      const vals = allDaily.filter(e=>e[key]!=null);
      return vals.length ? Math.round(vals.reduce((s,e)=>s+(+e[key]),0)/vals.length*100)/100 : null;
    };
    entry.energie = avg('energie');
    entry.pensees  = avg('pensees');
    entry.corps    = avg('corps');
  }

  setSyncStatus('wait');
  await push(userDataPath(`${ws}/checkin`), entry);
  ['ci-energie','ci-pensees','ci-corps','ci-repos','ci-couple','ci-poids'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
}

async function deleteCheckin(fbKey) {
  setSyncStatus('wait');
  await remove(ref(db,`users/${currentUID}/${ws}/checkin/${fbKey}`));
}

function exportCheckinCSV(type) {
  const allEntries = objToArr(wsd().checkin||{}).sort((a,b)=>b.createdAt-a.createdAt);
  const entries = type==='weekly' ? allEntries.filter(e=>e.weekly) : allEntries.filter(e=>!e.weekly);
  if(!entries.length){ alert('Aucune donnée à exporter.'); return; }
  let rows, filename;
  if(type==='daily') {
    rows = [['Date','Énergie','Pensées intenses','Corps / Bouffe','Note moyenne']];
    entries.forEach(e=>{
      const d = new Date(e.createdAt).toLocaleDateString('fr-CA');
      const note = e.energie!=null&&e.pensees!=null&&e.corps!=null ? Math.round(((+e.energie + +e.pensees + +e.corps)/3)*100)/100 : '';
      rows.push([d,e.energie??'',e.pensees??'',e.corps??'',note]);
    });
    filename = 'checkin-quotidien.csv';
  } else {
    rows = [['Date semaine','Énergie moy.','Pensées moy.','Repos','Corps moy.','Couple','Poids (lbs)']];
    entries.forEach(e=>{
      const d = new Date(e.createdAt).toLocaleDateString('fr-CA');
      rows.push([d,e.energie??'',e.pensees??'',e.repos??'',e.corps??'',e.couple??'',e.poids??'']);
    });
    filename = 'checkin-hebdomadaire.csv';
  }
  const csv = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}


function selectJournal(fbKey) {
  selectedJournalKey = selectedJournalKey === fbKey ? null : fbKey;
  renderJournal();
}

function exportJournalCSV() {
  const entries = objToArr(wsd().journal);
  if(!entries.length) return;
  const rows = [['Date','Texte']];
  entries.forEach(j=>{
    const d = new Date(j.createdAt).toLocaleDateString('fr-CA');
    rows.push([d, '"'+j.text.replace(/"/g,'""')+'"']);
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='journal.csv'; a.click();
  URL.revokeObjectURL(url);
}

async function deleteHistory(fbKey) {
  setSyncStatus('wait');
  await remove(ref(db,`users/${currentUID}/${ws}/history/${fbKey}`));
}


function renderAll() {
  if(activeTab==='tasks') renderTasks();
  else if(activeTab==='cats') renderCats();
  else if(activeTab==='journal') renderJournal();
  else if(activeTab==='history') renderHistory();
  else if(activeTab==='checkin') renderCheckin();
}

onAuthStateChanged(auth, (user) => {
  if(user) {
    currentUID = user.uid;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    document.getElementById('user-name').textContent = user.displayName?.split(' ')[0] || '';
    document.getElementById('user-avatar').src = user.photoURL || '';
    startListening();
  } else {
    currentUID = null;
    data = {vie:{tasks:{},history:{},journal:{}}, _flags:{}};
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
});

function exportHistoryCSV() {
  const hist = objToArr(wsd().history);
  if(!hist.length){ alert('Aucun historique à exporter.'); return; }
  const rows = [['Tâche','Note','Catégorie','Créée le','Complétée le','Durée (min)']];
  hist.forEach(h=>{
    const cat = cfg().labels[h.cat]||h.cat;
    const created = new Date(h.createdAt).toLocaleDateString('fr-CA');
    const completed = new Date(h.completedAt).toLocaleDateString('fr-CA');
    const dur = Math.round(h.duration/60000);
    rows.push([`"${(h.title||'').replace(/"/g,'""')}"`,`"${(h.note||'').replace(/"/g,'""')}"`,cat,created,completed,dur]);
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='historique-taches.csv'; a.click();
  URL.revokeObjectURL(url);
}

window.APP = { showTab, addTask, completeTask, deleteTask, saveJournal, deleteJournal, loginGoogle, logout, saveCheckin, setCiTab, selectJournal, exportJournalCSV, exportCheckinCSV, exportHistoryCSV, deleteHistory, seedCheckinData, deleteCheckin };
</script>
